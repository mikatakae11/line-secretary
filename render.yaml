services:
  - type: web
    name: line-procurement-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && cd job-scout && npm install --omit=dev
    startCommand: gunicorn app:app --workers 1 --threads 4 --timeout 120
    envVars:
      - key: LINE_CHANNEL_SECRET
        sync: false          # Renderダッシュボードで手動設定
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false          # hp-research-account.json の中身をそのまま貼り付け
      - key: JOB_SCOUT_TOKENS_JSON
        sync: false          # ~/.job-scout/tokens.json の中身をそのまま貼り付け
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SPREADSHEET_ID
        sync: false          # job-scout用スプレッドシートID
      - key: PYTHON_VERSION
        value: "3.11.0"
